name: Build OpenWrt

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: "SSH connection to Actions"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  actions: write

concurrency:
  group: openwrt-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_COWTRANSFER: false
  UPLOAD_WETRANSFER: false
  UPLOAD_RELEASE: false
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Space cleanup and initialize environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -euxo pipefail

          IMAGES="$(docker images -q || true)"
          if [ -n "$IMAGES" ]; then
            docker rmi $IMAGES
          fi

          sudo -E rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /etc/mysql \
            /etc/php \
            /etc/apt/sources.list.d

          sudo -E apt-get update

          sudo -E apt-get -y purge \
            azure-cli* \
            docker* \
            ghc* \
            zulu* \
            llvm* \
            firefox* \
            google* \
            dotnet* \
            powershell* \
            openjdk* \
            mysql* \
            php* \
            mongodb* \
            snap*

          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean

          sudo -E apt-get -y install \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext \
            genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev \
            libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev \
            libreadline-dev libssl-dev libtool llvm lrzsz libnsl-dev ninja-build p7zip p7zip-full patch pkgconf \
            python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion \
            swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-de

          sudo -E systemctl daemon-reload
          sudo -E apt -y autoremove --purge
          sudo -E apt clean
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown "$(id -un)":"$(id -gn)" /workdir

      - name: Clone source code
        working-directory: /workdir
        run: |
          set -euxo pipefail
          df -hT "$PWD"
          git clone "$REPO_URL" -b "$REPO_BRANCH" openwrt
          ln -sf /workdir/openwrt "$GITHUB_WORKSPACE/openwrt"

      - name: Load custom feeds
        run: |
          set -euxo pipefail
          [ -e "$FEEDS_CONF" ] && mv "$FEEDS_CONF" openwrt/feeds.conf.default
          [ -e "$DIY_P1_SH" ] && chmod +x "$DIY_P1_SH"
          cd openwrt
          [ -e "$GITHUB_WORKSPACE/$DIY_P1_SH" ] && "$GITHUB_WORKSPACE/$DIY_P1_SH"

      - name: Update feeds
        run: |
          set -euxo pipefail
          cd openwrt
          ./scripts/feeds update -a

      - name: Install feeds
        run: |
          set -euxo pipefail
          cd openwrt
          ./scripts/feeds install -a

      - name: Load custom configuration
        run: |
          set -euxo pipefail
          [ -e files ] && mv files openwrt/files
          [ -e "$CONFIG_FILE" ] && mv "$CONFIG_FILE" openwrt/.config
          [ -e "$DIY_P2_SH" ] && chmod +x "$DIY_P2_SH"
          cd openwrt
          [ -e "$GITHUB_WORKSPACE/$DIY_P2_SH" ] && "$GITHUB_WORKSPACE/$DIY_P2_SH"

      - name: SSH connection to Actions
        uses: P3TERX/ssh2actions@v1.0.0
        if: ${{ inputs.ssh }}
        env:
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      - name: Download package
        id: package
        run: |
          set -euxo pipefail
          cd openwrt
          make defconfig
          make download -j"$(nproc)"
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Compile the firmware
        id: compile
        run: |
          set -euxo pipefail
          cd openwrt
          echo -e "$(nproc) thread compile"
          make -j"$(nproc)" || make -j1 || make -j1 V=s

          echo "status=success" >> "$GITHUB_OUTPUT"

          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME || true
          if [ -s DEVICE_NAME ]; then
            echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> "$GITHUB_ENV"
          else
            echo "DEVICE_NAME=" >> "$GITHUB_ENV"
          fi

          echo "FILE_DATE=_$(date +'%Y%m%d%H%M')" >> "$GITHUB_ENV"

      - name: Check space usage
        if: ${{ !cancelled() }}
        run: df -hT

      - name: Upload bin directory
        uses: actions/upload-artifact@v4
        if: ${{ steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true' }}
        with:
          name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: openwrt/bin
          if-no-files-found: error
          compression-level: 0

      - name: Organize files
        id: organize
        if: ${{ env.UPLOAD_FIRMWARE == 'true' && !cancelled() }}
        run: |
          set -euxo pipefail
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> "$GITHUB_ENV"
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Upload firmware directory
        uses: actions/upload-artifact@v4
        if: ${{ steps.organize.outputs.status == 'success' && !cancelled() }}
        with:
          name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}
          if-no-files-found: error
          compression-level: 0

      - name: Upload firmware to cowtransfer
        id: cowtransfer
        if: ${{ steps.organize.outputs.status == 'success' && env.UPLOAD_COWTRANSFER == 'true' && !cancelled() }}
        run: |
          set -euxo pipefail
          curl -fsSL git.io/file-transfer | sh
          ./transfer cow --block 2621440 -s -p 64 --no-progress "${FIRMWARE}" 2>&1 | tee cowtransfer.log
          URL="$(grep -Eo 'https://[^ ]+' cowtransfer.log | head -n1 || true)"
          echo "::warning file=cowtransfer.com::${URL}"
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Upload firmware to WeTransfer
        id: wetransfer
        if: ${{ steps.organize.outputs.status == 'success' && env.UPLOAD_WETRANSFER == 'true' && !cancelled() }}
        run: |
          set -euxo pipefail
          curl -fsSL git.io/file-transfer | sh
          ./transfer wet -s -p 16 --no-progress "${FIRMWARE}" 2>&1 | tee wetransfer.log
          URL="$(grep -Eo 'https://[^ ]+' wetransfer.log | head -n1 || true)"
          echo "::warning file=wetransfer.com::${URL}"
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Generate release tag
        id: tag
        if: ${{ env.UPLOAD_RELEASE == 'true' && !cancelled() }}
        run: |
          set -euxo pipefail
          RELEASE_TAG="$(date +'%Y.%m.%d-%H%M')"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

          : > release.txt
          [ "$UPLOAD_COWTRANSFER" = "true" ] && [ -n "${{ steps.cowtransfer.outputs.url }}" ] && echo "🔗 [Cowtransfer](${{ steps.cowtransfer.outputs.url }})" >> release.txt
          [ "$UPLOAD_WETRANSFER" = "true" ] && [ -n "${{ steps.wetransfer.outputs.url }}" ] && echo "🔗 [WeTransfer](${{ steps.wetransfer.outputs.url }})" >> release.txt

          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Upload firmware to release
        uses: softprops/action-gh-release@v2
        if: ${{ steps.tag.outputs.status == 'success' && !cancelled() }}
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          files: ${{ env.FIRMWARE }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete workflow runs
        uses: GitRML/delete-workflow-runs@main
        if: ${{ !cancelled() }}
        with:
          retain_days: 1
          keep_minimum_runs: 3

      - name: Remove old releases
        uses: dev-drprasad/delete-older-releases@v0.3.4
        if: ${{ env.UPLOAD_RELEASE == 'true' && !cancelled() }}
        with:
          keep_latest: 3
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
